<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📺 TV Booking</title>
<style>
/* 🌟 Body */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial, sans-serif;
  background: #f0f1f5;
  color: #1c1c1e;
}

/* 🌟 Header */
h1 {
  text-align: center;
  font-size: 24px;
  font-weight: 600;
  margin: 15px 0;
}

/* 🌟 Calendar Grid */
#calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
  padding: 10px;
}

.day {
  background: linear-gradient(145deg, #ffffff, #e6e6f0);
  border-radius: 16px;
  padding: 12px 6px;
  font-size: 13px;
  text-align: center;
  box-shadow: 0 4px 8px rgba(0,0,0,0.08);
  transition: transform 0.15s, box-shadow 0.15s;
}

.day:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 12px rgba(0,0,0,0.12);
}

.day small {
  display: block;
  margin-top: 4px;
  color: #8e8e93;
  font-size: 11px;
}

/* 🌟 Panel (Bottom Sheet) */
#panel {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-height: 90%;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(20px);
  border-radius: 20px 20px 0 0;
  padding: 20px;
  display: none;
  overflow-y: auto;
  box-shadow: 0 -6px 20px rgba(0,0,0,0.1);
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

/* Drag Handle */
#panel::before {
  content: '';
  display: block;
  width: 40px;
  height: 5px;
  background: #ccc;
  border-radius: 10px;
  margin: 0 auto 12px;
}

/* 🌟 Hours Grid */
.hours {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 15px;
}

.hour {
  padding: 12px 0;
  border-radius: 12px;
  text-align: center;
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.1s, box-shadow 0.15s;
}

.hour.available {
  background: #e5f7ff;
  color: #007aff;
}

.hour.selected {
  background: #007aff;
  color: white;
  box-shadow: 0 4px 8px rgba(0,122,255,0.3);
}

.hour.taken {
  background: #d1d1d6;
  color: #8e8e93;
  cursor: not-allowed;
}

.hour:hover:not(.taken):not(.selected) {
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.08);
}

/* 🌟 Inputs */
input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 14px;
  background: #f2f2f7;
  outline: none;
  resize: none;
}

/* 🌟 Buttons */
button {
  margin-top: 12px;
  padding: 14px;
  width: 100%;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s;
}

button:active {
  transform: scale(0.97);
}

button.save {
  background: #007aff;
  color: white;
  box-shadow: 0 4px 10px rgba(0,122,255,0.3);
}

button.delete {
  background: #ff3b30;
  color: white;
  box-shadow: 0 4px 10px rgba(255,59,48,0.3);
}

button.close {
  background: #e5e5ea;
  color: #1c1c1e;
}

/* Smooth scroll for panel */
#panel {
  scroll-behavior: smooth;
}
</style>
</head>
<body>

<h1>📺 TV Booking</h1>
<div id="calendar"></div>

<div id="panel">
  <h3 id="dateText"></h3>
  <div class="hours" id="hours"></div>

  <input id="nameInput" placeholder="Your name">
  <textarea id="noteInput" placeholder="What are you doing?"></textarea>

  <button class="save" onclick="saveBooking()">Save</button>
  <button class="delete" onclick="deleteBooking()">Delete</button>
  <button class="close" onclick="closePanel()">Close</button>
</div>

<script>
// --- Booking Logic ---
const calendar = document.getElementById("calendar");
const hoursEl = document.getElementById("hours");

let bookings = JSON.parse(localStorage.getItem("tvBookings")) || {};
let selectedDate = "";
let selectedHours = [];
let dragging = false;

function generateCalendar() {
  calendar.innerHTML = "";
  const year = new Date().getFullYear();

  for (let d=new Date(year,0,1); d<=new Date(year,11,31); d.setDate(d.getDate()+1)) {
    const ds = d.toISOString().split("T")[0];
    const count = bookings[ds]?.hours?.length || 0;

    const div = document.createElement("div");
    div.className="day";
    div.innerHTML = `${d.getDate()}/${d.getMonth()+1}<small>${count} hrs</small>`;
    div.onclick = ()=>openPanel(ds);
    calendar.appendChild(div);
  }
}

function openPanel(date) {
  selectedDate = date;
  selectedHours = bookings[date]?.hours || [];

  document.getElementById("dateText").innerText = date;
  document.getElementById("nameInput").value = localStorage.getItem("name") || "";
  document.getElementById("noteInput").value = bookings[date]?.note || "";

  hoursEl.innerHTML="";

  for (let i=0;i<24;i++) {
    const h=document.createElement("div");
    h.innerText=i+":00";

    const taken = bookings[date]?.hours?.includes(i);
    h.className="hour "+(taken?"taken":"available");
    if(selectedHours.includes(i)) h.classList.add("selected");

    h.onmousedown=()=>startDrag(i,h,taken);
    h.onmouseover=()=>dragOver(i,h,taken);

    h.ontouchstart=()=>startDrag(i,h,taken);
    h.ontouchmove=e=>{
      const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
      if(el && el.classList.contains("hour")){
        const hr=parseInt(el.innerText);
        dragOver(hr,el,false);
      }
    };

    hoursEl.appendChild(h);
  }

  document.addEventListener("mouseup",()=>dragging=false);
  document.addEventListener("touchend",()=>dragging=false);
  document.getElementById("panel").style.display="block";
}

function startDrag(i,el,taken){ if(taken) return; dragging=true; toggle(i,el); }
function dragOver(i,el,taken){ if(!dragging || taken) return; if(!selectedHours.includes(i)) toggle(i,el); }
function toggle(i,el){ if(selectedHours.includes(i)){ selectedHours=selectedHours.filter(x=>x!==i); el.classList.remove("selected"); } else { selectedHours.push(i); el.classList.add("selected"); } }

function saveBooking(){
  const name=document.getElementById("nameInput").value;
  localStorage.setItem("name",name);
  bookings[selectedDate]={ hours:selectedHours, note:document.getElementById("noteInput").value, name:name };
  localStorage.setItem("tvBookings", JSON.stringify(bookings));
  alert("✅ Saved!");
  closePanel();
  generateCalendar();
}

function deleteBooking(){
  delete bookings[selectedDate];
  localStorage.setItem("tvBookings", JSON.stringify(bookings));
  alert("🗑️ Deleted");
  closePanel();
  generateCalendar();
}

function closePanel(){ document.getElementById("panel").style.display="none"; }

generateCalendar();
</script>

</body>
</html>
