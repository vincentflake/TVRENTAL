<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Booking Ultimate</title>
<link rel="manifest" href="manifest.json">
<style>
body { margin:0; font-family:Arial; background:#f2f2f2; }
h1 { text-align:center; padding:10px; }
#calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; padding:5px; }
.day { background:white; border-radius:8px; padding:8px; font-size:12px; }
.day small { display:block; color:#666; }
#panel { position:fixed; bottom:0; width:100%; background:white; border-radius:15px 15px 0 0; padding:15px; display:none; max-height:90%; overflow:auto; }
.hours { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
.hour { padding:10px; text-align:center; border-radius:6px; user-select:none; }
.available { background:#e0f7fa; }
.selected { background:#4caf50; color:white; }
.taken { background:#ccc; }
input, textarea { width:100%; margin-top:8px; padding:10px; border-radius:8px; border:1px solid #ccc; }
button { margin-top:10px; padding:12px; width:100%; border:none; border-radius:8px; }
.save { background:#4caf50; color:white; }
.delete { background:#f44336; color:white; }
.close { background:#ccc; }
</style>
</head>
<body>
<h1>📺 TV Booking</h1>
<div id="calendar"></div>

<div id="panel">
 <h3 id="dateText"></h3>
 <div class="hours" id="hours"></div>
 <input id="nameInput" placeholder="Your name">
 <textarea id="noteInput" placeholder="What are you doing?"></textarea>
 <button class="save" onclick="saveBooking()">Save</button>
 <button class="delete" onclick="deleteBooking()">Delete</button>
 <button class="close" onclick="closePanel()">Close</button>
</div>

<script>
const calendar = document.getElementById("calendar");
const hoursEl = document.getElementById("hours");

let bookings = JSON.parse(localStorage.getItem("tvBookings")) || {};
let selectedDate = "";
let selectedHours = [];
let dragging = false;

function generateCalendar() {
 calendar.innerHTML = "";
 const year = new Date().getFullYear();

 for (let d=new Date(year,0,1); d<=new Date(year,11,31); d.setDate(d.getDate()+1)) {
  const ds = d.toISOString().split("T")[0];
  const count = bookings[ds]?.hours?.length || 0;

  const div = document.createElement("div");
  div.className="day";
  div.innerHTML = `${d.getDate()}/${d.getMonth()+1}<small>${count} hrs</small>`;
  div.onclick = ()=>openPanel(ds);
  calendar.appendChild(div);
 }
}

function openPanel(date) {
 selectedDate = date;
 selectedHours = bookings[date]?.hours || [];

 document.getElementById("dateText").innerText = date;
 document.getElementById("nameInput").value = localStorage.getItem("name") || "";
 document.getElementById("noteInput").value = bookings[date]?.note || "";

 hoursEl.innerHTML="";

 for (let i=0;i<24;i++) {
  const h=document.createElement("div");
  h.innerText=i+":00";
  const taken = bookings[date]?.hours?.includes(i);
  h.className="hour "+(taken?"taken":"available");
  if(selectedHours.includes(i)) h.classList.add("selected");

  h.onmousedown=()=>startDrag(i,h,taken);
  h.onmouseover=()=>dragOver(i,h,taken);

  h.ontouchstart=()=>startDrag(i,h,taken);
  h.ontouchmove=e=>{
   const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
   if(el && el.classList.contains("hour")){
     const hr=parseInt(el.innerText);
     dragOver(hr,el,false);
   }
  };

  hoursEl.appendChild(h);
 }

 document.addEventListener("mouseup",()=>dragging=false);
 document.addEventListener("touchend",()=>dragging=false);

 panel.style.display="block";
}

function startDrag(i,el,taken){
 if(taken) return;
 dragging=true;
 toggle(i,el);
}

function dragOver(i,el,taken){
 if(!dragging || taken) return;
 if(!selectedHours.includes(i)) toggle(i,el);
}

function toggle(i,el){
 if(selectedHours.includes(i)){
  selectedHours=selectedHours.filter(x=>x!==i);
  el.classList.remove("selected");
 } else {
  selectedHours.push(i);
  el.classList.add("selected");
 }
}

function saveBooking(){
 const name=document.getElementById("nameInput").value;
 localStorage.setItem("name",name);

 bookings[selectedDate] = {
  hours:selectedHours,
  note:document.getElementById("noteInput").value,
  name:name
 };

 localStorage.setItem("tvBookings", JSON.stringify(bookings));

 alert("✅ Booking saved!");
 panel.style.display="none";
 generateCalendar();
}

function deleteBooking(){
 delete bookings[selectedDate];
 localStorage.setItem("tvBookings", JSON.stringify(bookings));
 alert("🗑️ Deleted");
 panel.style.display="none";
 generateCalendar();
}

function closePanel(){ panel.style.display="none"; }

generateCalendar();
</script>
</body>
</html>
